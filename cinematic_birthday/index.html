<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> lilo birthday </title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* نجوم الخلفية */
        .stars { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle linear infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

        /* حاوية العناصر العايمة */
        .photo-dreamscape {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            opacity: 0; transition: opacity 2s ease; z-index: 1; pointer-events: none;
        }
        
        .envelope.open ~ .photo-dreamscape { opacity: 0.9; }

        /* البرواز السينمائي المشترك للصور والفيديو */
        .floating-item {
            position: absolute;
            border: 6px solid white; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border-radius: 4px; overflow: hidden;
            opacity: 0;
            backface-visibility: hidden;
        }

        /* لضمان أن الفيديو أو الصورة يملأ البرواز */
        .floating-item img, .floating-item video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.9) contrast(1.1); 
        }

        /* أنماط الحركة العشوائية */
        @keyframes floatRandom1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(20px, -30px) rotate(5deg); }
            66% { transform: translate(-15px, 15px) rotate(-3deg); }
        }
        @keyframes floatRandom2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, -20px) scale(1.05); }
        }
        @keyframes cinematicFade {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }

        /* --- توزيع العناصر بعيداً عن الرسالة --- */

        /* العنصر 1: فيديو (فوق يمين) */
        .item-1 { 
            width: 240px; height: 320px; top: 99%; right: 125%; 
            animation: cinematicFade 1.5s ease 0.2s forwards, floatRandom1 10s infinite ease-in-out;
        }
        /* صورة 2: تحت شمال */
        .item-2 { 
            width: 200px; height: 300px; bottom: 95%; left: 99%; 
            animation: cinematicFade 1.5s ease 0.6s forwards, floatRandom2 12s infinite ease-in-out;
        }
        /* صورة 3: فوق شمال */
        .item-3 { 
            width: 220px; height: 250px; top: 99%; left: 99%; 
            animation: cinematicFade 1.5s ease 1s forwards, floatRandom1 15s infinite reverse linear;
        }
        /* صورة 4: تحت يمين */
        .item-4 { 
            width: 260px; height: 270px; bottom: 110%; right: 90%; 
            animation: cinematicFade 1.5s ease 1.4s forwards, floatRandom2 9s infinite reverse ease-in-out;
        }
        .item-5 { 
            width: 250px; height: 290px; top: 5%; left: 160%; 
            animation: cinematicFade 1.5s ease 1.8s forwards, floatRandom2 17s infinite reverse linear;
        }
        .item-6 { 
            width: 250px; height: 290px; bottom: 5%; right: 160%; 
            animation: cinematicFade 1.5s ease 2.2s forwards, floatRandom2 12s infinite reverse ease-in-out;
        }
        .item-7 { 
            width: 210px; height: 290px; bottom: -140%; left: 15%; 
            animation: cinematicFade 1.5s ease 2.6s forwards, floatRandom2 17s infinite reverse linear;
        }

        /* الجواب والرسالة */
        .card-container { perspective: 1200px; z-index: 10; text-align: center; }
        .envelope {
            width: 320px; height: 220px; background: #ff758f; position: relative;
            transform-style: preserve-3d; transition: transform 1s ease; cursor: pointer;
        }
        .front {
            position: absolute; width: 100%; height: 100%; background: #ff4d6d; z-index: 10;
            display: flex; justify-content: center; align-items: center; border-radius: 5px;
        }
        .flap {
            position: absolute; width: 100%; height: 110px; top: 0; background: #ff4d6d;
            transform-origin: top; transition: transform 0.8s ease; z-index: 11;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }
        .letter {
            position: absolute; background: white; width: 90%; height: 90%; top: -24%; left: 5%;
            z-index: 6; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 5px;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease;
            opacity: 0;
        }
        .envelope.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope.open .letter { transform: translateY(-145px); opacity: 1; }

        .open-btn {
            margin-top: 60px; background: #ff4d6d; color: white; border: none;
            padding: 12px 35px; border-radius: 30px; cursor: pointer; font-size: 1.1rem;
        }
        .envelope.open + .open-btn { display: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="./audio2.mpeg" type="audio/mpeg">
    </audio>

    <div class="stars" id="starsContainer"></div>

    <div class="card-container">
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <div class="front"><span style="font-size: 50px; color: white;">💌</span></div>
            <div class="letter">
                <h2 style="color: #ff4d6d; margin: 0; font-family: 'Cairo';"> Happy birthday lilooo ❤️</h2>
                <p style="color: #333; font-family: 'Cairo';">  ✨</p>
            </div>
        </div>
        
        <button class="open-btn" onclick="openCard()"> دوسي هنا يا بت 🎁</button>

        <div class="photo-dreamscape">
            <div class="floating-item item-1">
                <video id="myVideo" loop muted playsinline>
                    <source src="vid1.mp4" type="video/mp4">
                    متصفحك لا يدعم الفيديو.
                </video>
            </div>
            <div class="floating-item item-7">
                <video id="myVideo1" loop muted playsinline>
                    <source src="vid2.mp4" type="video/mp4">
                    متصفحك لا يدعم الفيديو.
                </video>
            </div>
            
            <div class="floating-item item-6"><img src="1.jpeg"></div>
            <div class="floating-item item-2"><img src="2.jpeg"></div>
            <div class="floating-item item-3"><img src="3.jpeg"></div>
            <div class="floating-item item-4"><img src="4.jpeg"></div>
            <div class="floating-item item-5"><img src="5.jpeg"></div>
        </div>
    </div>

    <script>
        // نجوم الخلفية
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = Math.random() * 2 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDuration = Math.random() * 3 + 1 + 's';
            starsContainer.appendChild(star);
        }

        function openCard() {
            document.getElementById('envelope').classList.add('open');
            // تشغيل الفيديو أول ما الجواب يتفتح
            const video = document.getElementById('myVideo');
            video.play();
            const video1 = document.getElementById('myVideo1');
            video1.play();

            // تشغيل الأغنية المضافة
            const music = document.getElementById('bgMusic');
            music.play().catch(error => console.log("Music play blocked"));
        }
    </script>
</body>
</html>
